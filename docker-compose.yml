services:
    nginx:  
        image: nginx:1.21.1
        ports:
            - "8002:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./src:/var/www/
        depends_on:
            - php

    php:
        build: ./docker/php
        volumes:
            - ./src:/var/www/

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: rese_db
            MYSQL_USER: rese_user
            MYSQL_PASSWORD: rese_pass
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

    phpmyadmin:
        image: phpmyadmin/phpmyadmin

        environment:
            - PMA_ARBITRARY=1
            - PMA_HOST=mysql
            - PMA_USER=rese_user
            - PMA_PASSWORD=rese_pass
        depends_on:
            - mysql
        ports:
            - 8082:80